version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: distributed_postgres
    environment:
      POSTGRES_USER: gateway_admin
      POSTGRES_PASSWORD: Hassouna10:)D
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-init:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data

  redis-cache:
    image: redis:7-alpine
    container_name: distributed_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: