server:
  port: 8080 

spring:
  # --- 1. ROUTING (Spring Cloud Gateway) ---
  cloud:
    gateway:
      routes:
        - id: protected-api-route
          uri: https://httpbin.org 
          predicates:
            - Path=/api/**

  # --- 2. CACHE DATABASE (Redis for Rate Limiting) ---
  data:
    redis:
      host: localhost
      port: 6379

  # --- 3. MAIN DATABASE (PostgreSQL for API Keys & Authentication) ---
  datasource:
    url: jdbc:postgresql://localhost:5432/hasan_database
    username: hasan_database
    password: data7227
    driver-class-name: org.postgresql.Driver

  # --- 4. ORM SETTINGS (JPA / Hibernate) ---
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect